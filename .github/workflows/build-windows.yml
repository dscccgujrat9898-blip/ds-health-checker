name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install smartmontools (smartctl) and bundle it
        shell: pwsh
        run: |
          choco install smartmontools -y
          $smartctl = "C:\Program Files\smartmontools\bin\smartctl.exe"
          if (!(Test-Path $smartctl)) {
            $smartctl = "C:\Program Files\smartmontools\smartctl.exe"
          }
          if (!(Test-Path $smartctl)) {
            Write-Host "smartctl.exe not found after install!"
            Get-ChildItem "C:\Program Files\smartmontools" -Recurse | Select-Object FullName
            exit 1
          }
          mkdir smartmontools
          Copy-Item (Split-Path $smartctl -Parent) smartmontools -Recurse -Force
          Write-Host "Bundled smartctl from: $smartctl"

      - name: Build EXE (PyInstaller)
        run: |
          pyinstaller ds_health_checker.spec

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DS_Health_Checker_Windows
          path: dist/DS_Health_Checker/**
