name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install smartmontools
        run: |
          choco install smartmontools -y
          mkdir smartmontools
          $p = (Get-Command smartctl.exe).Source
          Copy-Item (Split-Path $p -Parent) smartmontools -Recurse -Force

      - name: Build EXE
        run: |
          pyinstaller ds_health_checker.spec

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: DS_Health_Checker
          path: dist/DS_Health_Checker/**
